kind = "web"
previewPath = "/"
title = "KIUT"
version = "1.0.0"
id = "artifacts/kiut"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23653

[services.development]
run = "pnpm --filter @workspace/kiut run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kiut", "run", "build" ]
publicDir = "artifacts/kiut/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23653"
BASE_PATH = "/"
